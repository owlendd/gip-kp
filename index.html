<html lang="ru">
<head>
<meta charset="UTF-8">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#111;color:#fff}
.layout{display:flex;height:100vh}

/* Sidebar */
.sidebar{width:250px;background:#0a0a0a;border-right:1px solid #333;padding:20px 14px;flex-shrink:0;overflow-y:auto}
.sidebar h2{color:#8BC34A;font-size:17px;margin-bottom:20px;padding:0 6px}
.sidebar button{display:block;width:100%;text-align:left;padding:9px 12px;margin-bottom:4px;border:none;border-radius:6px;background:#1a1a1a;color:#999;font-size:13px;cursor:pointer;transition:all .15s}
.sidebar button:hover{background:#252525;color:#fff}
.sidebar button.active{background:#8BC34A;color:#000;font-weight:600}
.sidebar .sep{height:1px;background:#333;margin:10px 0}
.sidebar .sep-label{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:1px;padding:0 6px;margin:8px 0 4px}

/* Main */
.main{flex:1;overflow-y:auto;padding:32px 40px}
.content{max-width:860px;margin:0 auto}
.section{display:none}.section.active{display:block}
h2.title{color:#8BC34A;font-size:22px;margin-bottom:20px}
h3{font-size:15px;margin-bottom:10px;color:#ccc}
h4{font-size:13px;color:#888;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
label.field-label{display:block;font-size:12px;color:#aaa;margin-bottom:5px}
input[type="text"],input[type="number"],input[type="date"],select,textarea{
  width:100%;padding:9px 11px;background:#1a1a1a;border:1px solid #333;border-radius:6px;color:#fff;font-size:13px;outline:none;transition:border .15s}
input:focus,select:focus,textarea:focus{border-color:#8BC34A}
textarea{resize:vertical;height:70px}
.field{margin-bottom:14px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}

/* Big input */
.big-input{font-size:24px!important;padding:16px!important;text-align:center;font-weight:700;border-color:#8BC34A!important}
.big-input:focus{box-shadow:0 0 0 3px rgba(139,195,74,.2)}

/* Checkboxes */
.check-group{margin-bottom:8px}
.check-group label{display:flex;align-items:center;gap:8px;cursor:pointer;padding:5px 0;font-size:13px}
.check-group input[type="checkbox"]{width:16px;height:16px;accent-color:#8BC34A;cursor:pointer}

/* Cards */
.section-card{background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:14px;margin-bottom:10px}
.section-card .label{font-size:12px;font-weight:500;margin-bottom:8px;color:#ddd}
.section-card .checks{display:flex;gap:20px}
.section-card .checks label{display:flex;align-items:center;gap:5px;font-size:11px;color:#aaa;cursor:pointer}

/* Info boxes */
.info-box{background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:16px;margin-bottom:14px}
.info-box.accent{border-color:rgba(139,195,74,.4);background:rgba(139,195,74,.05)}
.info-box.warn{border-color:rgba(255,193,7,.4);background:rgba(255,193,7,.05)}
.info-box.internal{border-color:rgba(100,149,237,.4);background:rgba(100,149,237,.05)}
.info-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #2a2a2a;font-size:13px}
.info-row:last-child{border-bottom:none}
.info-row .lbl{color:#888}.info-row .val{font-weight:600;color:#ccc}
.info-row .val.green{color:#8BC34A}.info-row .val.big{font-size:18px;color:#8BC34A}

/* Table */
.tbl{width:100%;border-collapse:separate;border-spacing:0;border-radius:8px;overflow:hidden;margin-bottom:14px}
.tbl th{background:#222;color:#8BC34A;padding:10px 12px;font-size:11px;font-weight:600;text-align:left;text-transform:uppercase;letter-spacing:.3px}
.tbl td{padding:9px 12px;font-size:12px;border-bottom:1px solid #2a2a2a;background:#1a1a1a;color:#ccc}
.tbl tr:nth-child(even) td{background:#161616}
.tbl tr.total td{background:rgba(139,195,74,.08)!important;font-weight:700;color:#fff;font-size:13px}
.tbl .hl{color:#8BC34A;font-weight:600}

/* Buttons */
.actions{margin-top:32px;display:flex;gap:10px;flex-wrap:wrap;padding-bottom:32px}
.btn{padding:12px 24px;font-size:14px;font-weight:600;border:none;border-radius:8px;cursor:pointer;transition:all .15s}
.btn-primary{background:#8BC34A;color:#000}.btn-primary:hover{background:#7ab300}
.btn-secondary{background:#333;color:#fff}.btn-secondary:hover{background:#444}
.btn-blue{background:#4a7cc9;color:#fff}.btn-blue:hover{background:#3a6cb9}
.btn-sm{padding:8px 16px;font-size:12px;border-radius:6px}
.btn-add{padding:8px 16px;background:#8BC34A;color:#000;font-weight:500;font-size:13px;border:none;border-radius:6px;cursor:pointer}
.btn-remove{padding:8px 14px;background:#5c1a1a;border:none;color:#fff;border-radius:6px;cursor:pointer;font-size:12px}
.btn-remove:hover{background:#7a2222}

.excl-row{display:flex;gap:8px;margin-bottom:6px}
.excl-row input{flex:1}
.payment-card{background:#1a1a1a;border-radius:8px;padding:14px;margin-bottom:10px}

/* Timeline */
.timeline{position:relative;padding-left:24px;margin:16px 0}
.timeline::before{content:'';position:absolute;left:8px;top:0;bottom:0;width:2px;background:#333}
.tl-item{position:relative;margin-bottom:14px;padding-left:16px}
.tl-item::before{content:'';position:absolute;left:-20px;top:6px;width:10px;height:10px;border-radius:50%;background:#8BC34A;border:2px solid #111}
.tl-date{font-size:11px;color:#8BC34A;font-weight:600}.tl-desc{font-size:13px;color:#ccc;margin-top:2px}.tl-amount{font-size:12px;color:#888;margin-top:1px}

/* History */
.hist-card{background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:14px;margin-bottom:8px;cursor:pointer;transition:border .15s}
.hist-card:hover{border-color:#8BC34A}
.hist-card .name{font-size:14px;font-weight:600;margin-bottom:4px}
.hist-card .meta{font-size:11px;color:#888}
.hist-card .price{font-size:13px;color:#8BC34A;font-weight:600;margin-top:4px}

/* Labor */
.labor-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr;gap:8px;align-items:center;padding:8px 0;border-bottom:1px solid #2a2a2a;font-size:12px}
.labor-row.header{font-weight:600;color:#8BC34A;font-size:11px;text-transform:uppercase;border-bottom:2px solid #333}
.labor-input{width:100%;padding:6px 8px;background:#222;border:1px solid #333;border-radius:4px;color:#fff;font-size:12px;text-align:center}

/* НДС badge */
.nds-badge{display:inline-block;background:rgba(139,195,74,.15);border:1px solid rgba(139,195,74,.3);border-radius:4px;padding:3px 10px;font-size:11px;color:#8BC34A;font-weight:600}
</style>
</head>

const NAV_SECTIONS = [

// ========== STATE ==========
function makeDefaultFd(){
  const fd = {
    projectName:'', customerName:'', kpDate:new Date().toISOString().split('T')[0],
    kpNumber:'', kpVersion:1, validityDays:30, internalNotes:'',
    objectType:'', objectAddress:'', objectPurpose:'', totalArea:0, floorsCount:'',
    sectionsCount:0, apartmentsCount:0, landArea:0, cadastralNumber:'',
    parkingArea:0, commercialArea:0, showParking:false, showCommercial:false,
    stages:{ago:false,stageP:false,stageR:false,expertise:false,engineering:false},
    additionalServices:{fireSafety:false,sanitary:false,authorSupervision:false},
    designSections:{},
    customSections:[],
    totalContractPrice:0,
    costs:{agoPrice:0, engineeringPrice:0, expertisePrice:0, additionalWorksPrice:0},
    labor:{avgSalary:100, sectionStaff:{}},
    schedules:{agoDays:0,engineeringDays:0,stagePDays:0,expertiseDays:0,stageRDays:0},
    payments:[
      {pct:20,desc:'Аванс'},
      {pct:20,desc:'После передачи проектной документации'},
      {pct:20,desc:'После экспертизы проекта'},
      {pct:15,desc:'Аванс рабочей документации'},
      {pct:15,desc:'После передачи рабочей документации'},
      {pct:10,desc:'После отработки замечаний'},
    ],
    gapName:'',
    exclusions:['Проведение тендеров','Смета на строительно-монтажные работы','Авторский надзор','Экспертиза'],
  };
  DEFAULT_SECTIONS.forEach(s=>{
    fd.designSections[s.key]={enabled:true,stageP:true,stageR:true,pct:s.pct};
    fd.labor.sectionStaff[s.key]={people:1,days:90};
  });
  return fd;
}

let fd = makeDefaultFd();
try{const s=localStorage.getItem('kpFormV3');if(s){const loaded=JSON.parse(s);fd={...makeDefaultFd(),...loaded}}}catch(e){}
// обратная совместимость со старыми данными
if(!fd.customSections)fd.customSections=[];
if(fd.showParking===undefined)fd.showParking=false;
if(fd.showCommercial===undefined)fd.showCommercial=false;
if(!fd.parkingArea)fd.parkingArea=0;
if(!fd.commercialArea)fd.commercialArea=0;
getAllSections().forEach(s=>{
  if(!fd.designSections[s.key])fd.designSections[s.key]={enabled:true,stageP:true,stageR:true,pct:s.pct};
  if(!fd.designSections[s.key].hasOwnProperty('pct'))fd.designSections[s.key].pct=s.pct;
  if(!fd.labor.sectionStaff[s.key])fd.labor.sectionStaff[s.key]={people:1,days:90};
  // конвертация months→days для старых данных
  const st=fd.labor.sectionStaff[s.key];
  if(st.months!==undefined&&st.days===undefined){st.days=Math.round(st.months*30);delete st.months;}
});
if(!fd.payments)fd.payments=makeDefaultFd().payments;

let _saveTimer;
function save(){clearTimeout(_saveTimer);_saveTimer=setTimeout(()=>localStorage.setItem('kpFormV3',JSON.stringify(fd)),400);}
function saveNow(){clearTimeout(_saveTimer);localStorage.setItem('kpFormV3',JSON.stringify(fd));}

let activeSection='main';

// ========== HELPERS ==========
function fmt(n){return Math.round(Number(n)).toLocaleString('ru-RU')}
function fmtDec(n,d=1){return Number(n).toLocaleString('ru-RU',{minimumFractionDigits:d,maximumFractionDigits:d})}
function optSel(arr,val){return arr.map(v=>`<option value="${v}" ${v===val?'selected':''}>${v}</option>`).join('')}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function fmtInput(v){return String(v).replace(/\s/g,'').replace(/\B(?=(\d{3})+(?!\d))/g,' ')}
function parseFmtInput(s){return parseFloat(String(s).replace(/\s/g,''))||0}

function getAllSections(){return [...DEFAULT_SECTIONS, ...(fd.customSections||[])]}
function getEnabledSections(){return getAllSections().filter(s=>fd.designSections[s.key]?.enabled)}
function getSectionPct(key){return fd.designSections[key]?.pct ?? DEFAULT_SECTIONS.find(s=>s.key===key)?.pct ?? 0}

function calcTotals(){
  const enabled = getEnabledSections();
  const rawPctSum = enabled.reduce((a,s)=>a+getSectionPct(s.key),0);
  const totalWithNds = fd.totalContractPrice;
  const nds = totalWithNds - totalWithNds / (1 + NDS_RATE);
  const basePrice = totalWithNds - nds;
  const totalCost = basePrice / COST_COEFFICIENT;
  const margin = basePrice > 0 ? (basePrice - totalCost) / basePrice * 100 : 0;
  const pricePerM2 = fd.totalArea > 0 ? totalWithNds / fd.totalArea : 0;
  const extras = fd.costs.agoPrice + fd.costs.engineeringPrice + fd.costs.expertisePrice + fd.costs.additionalWorksPrice;
  const grandTotal = totalWithNds + extras;
  const sectionBreakdown = getAllSections().map(s=>{
    const en = fd.designSections[s.key]?.enabled;
    const myPct = getSectionPct(s.key);
    const adjPct = en && rawPctSum > 0 ? myPct / rawPctSum * 100 : 0;
    const price = basePrice * adjPct / 100;
    const cost = price / COST_COEFFICIENT;
    return {...s, myPct, adjPct, price, cost, enabled: en};
  });
  return {basePrice,nds,totalWithNds,totalCost,margin,pricePerM2,extras,grandTotal,sectionBreakdown,rawPctSum};
}

function calcLabor(sKey){
  const staff = fd.labor.sectionStaff[sKey] || {people:1,days:90};
  const costPerMonth = fd.labor.avgSalary * SALARY_TO_COST_COEFF;
  const months = (staff.days||0) / WORKING_DAYS_PER_MONTH;
  const totalCost = staff.people * months * costPerMonth * 1000;
  const budgetForSection = calcTotals().sectionBreakdown.find(s=>s.key===sKey)?.cost || 0;
  const diff = budgetForSection - totalCost;
  return {costPerMonth, totalCost, budgetForSection, diff, ok: diff >= 0};
}

// ========== NAV ==========
function getSectionStatus(id){
  switch(id){
    case 'main': return fd.projectName&&fd.customerName?'done':(fd.projectName||fd.customerName?'partial':'empty');
    case 'parameters': return fd.objectType&&fd.totalArea>0?'done':(fd.objectType||fd.totalArea?'partial':'empty');
    case 'stages': return (fd.stages.stageP||fd.stages.stageR||fd.stages.ago)?'done':'empty';
    case 'design': return getEnabledSections().length>0?'done':'empty';
    case 'costs': return fd.totalContractPrice>0?'done':'empty';
    case 'labor': return fd.labor.avgSalary>0?'done':'empty';
    case 'schedules': {const s=fd.schedules;return (s.stagePDays||s.stageRDays||s.agoDays)?'done':'empty'}
    case 'payment': {const sum=fd.payments.reduce((a,p)=>a+p.pct,0);return Math.abs(sum-100)<0.1?'done':(sum>0?'partial':'empty')}
    case 'gap': return 'done';
    case 'exclusions': return fd.exclusions.filter(e=>e).length>0?'done':'empty';
    default: return 'none';
  }
}
const STATUS_DOT={done:'background:#8BC34A',partial:'background:#FFC107',empty:'background:#444',none:'display:none'};

function renderNav(){
  const nav=document.getElementById('nav');
  nav.innerHTML=NAV_SECTIONS.map(s=>{
    if(s.id.startsWith('_sep'))return `<div class="sep"></div>${s.label?`<div class="sep-label">${s.label}</div>`:''}`;
    const st=getSectionStatus(s.id);
    const dot=STATUS_DOT[st]||STATUS_DOT.none;
    return `<button class="${s.id===activeSection?'active':''}" onclick="switchSection('${s.id}')"><span style="display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:8px;vertical-align:middle;${dot}"></span>${s.label}</button>`;
  }).join('');
}
function switchSection(id){
  activeSection=id;
  renderNav();
  document.querySelectorAll('.section').forEach(el=>el.classList.remove('active'));
  const el=document.getElementById('sec-'+id);
  if(el)el.classList.add('active');
  if(id==='analytics'||id==='costs'||id==='labor'||id==='payment')updateDynamic();
}

  const c=document.getElementById('sections');
  const t=calcTotals();

  c.innerHTML=`

    <h2 class="title">Основная информация</h2>

      <div class="field"><label class="field-label">Номер КП</label>
        <input type="text" value="${fd.kpNumber}" oninput="fd.kpNumber=this.value;save()" placeholder="КП-2026-001"></div>
      <div class="field"><label class="field-label">Версия</label>

        <input type="number" min="1" value="${fd.validityDays||30}" oninput="fd.validityDays=parseInt(this.value)||30;save()" style="text-align:center"></div>
    </div>
    <div class="field"><label class="field-label">Название проекта *</label>
      <input type="text" value="${fd.projectName}" oninput="fd.projectName=this.value;save()"></div>
    <div class="field"><label class="field-label">Заказчик — название организации *</label>
      <input type="text" value="${fd.customerName}" oninput="fd.customerName=this.value;save()"></div>
    <div class="field"><label class="field-label">Дата КП *</label>
      <input type="date" value="${fd.kpDate}" oninput="fd.kpDate=this.value;save()"></div>
  </div>

  <!-- ===== ПАРАМЕТРЫ ОБЪЕКТА ===== -->
  <div class="section ${activeSection==='parameters'?'active':''}" id="sec-parameters">
    <h2 class="title">Параметры объекта</h2>
    <div class="field"><label class="field-label">Тип объекта</label>

    <div class="field"><label class="field-label">Адрес объекта</label>
      <input type="text" value="${fd.objectAddress}" oninput="fd.objectAddress=this.value;save()"></div>
    <div class="field"><label class="field-label">Назначение</label>
      <textarea oninput="fd.objectPurpose=this.value;save()">${fd.objectPurpose}</textarea></div>
    <div class="grid2">

        <input type="number" value="${fd.totalArea||''}" oninput="fd.totalArea=parseFloat(this.value)||0;save();updateDynamic()"></div>
      <div class="field"><label class="field-label">Этажность</label>
        <input type="text" value="${fd.floorsCount}" oninput="fd.floorsCount=this.value;save()"></div>
    </div>
    <div class="grid2">
      <div class="field"><label class="field-label">Количество секций</label>
        <input type="number" value="${fd.sectionsCount||''}" oninput="fd.sectionsCount=parseInt(this.value)||0;save()"></div>
      <div class="field"><label class="field-label">Количество квартир</label>
        <input type="number" value="${fd.apartmentsCount||''}" oninput="fd.apartmentsCount=parseInt(this.value)||0;save()"></div>
    </div>
    <div class="grid2">
      <div class="field"><label class="field-label">Площадь зем. участка, га</label>
        <input type="number" step="0.01" value="${fd.landArea||''}" oninput="fd.landArea=parseFloat(this.value)||0;save()"></div>
      <div class="field"><label class="field-label">Кадастровый номер</label>
        <input type="text" value="${fd.cadastralNumber}" oninput="fd.cadastralNumber=this.value;save()"></div>
    </div>
    <div class="grid2">
      <div class="field">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px">
          <label class="field-label" style="margin:0">Площадь паркинга, м²</label>
          <label style="font-size:11px;color:#888;cursor:pointer;display:flex;align-items:center;gap:4px">
            <input type="checkbox" ${fd.showParking?'checked':''} onchange="fd.showParking=this.checked;save()" style="width:14px;height:14px;accent-color:#8BC34A"> В КП

// ========== PAYMENTS ==========
function renderPayments(){
  const el=document.getElementById('paymentsList');if(!el)return;
  el.innerHTML=fd.payments.map((p,i)=>
    `<div class="payment-card">
      <div style="display:flex;gap:10px;align-items:center;margin-bottom:6px">
        <div style="display:flex;flex-direction:column;gap:2px;margin-top:14px">
          ${i>0?`<button style="background:#333;border:none;color:#fff;cursor:pointer;border-radius:4px;padding:2px 6px;font-size:10px" onclick="movePayment(${i},-1)">&#9650;</button>`:'<div style="height:20px"></div>'}
          ${i<fd.payments.length-1?`<button style="background:#333;border:none;color:#fff;cursor:pointer;border-radius:4px;padding:2px 6px;font-size:10px" onclick="movePayment(${i},1)">&#9660;</button>`:'<div style="height:20px"></div>'}
        </div>
        <div style="flex:0 0 70px"><label class="field-label">%</label>
          <input type="number" max="100" min="0" value="${p.pct||''}" style="text-align:center"
            oninput="fd.payments[${i}].pct=parseFloat(this.value)||0;save();updateDynamic()"></div>
        <div id="payAmt${i}" style="flex:1;font-size:13px;color:#8BC34A;font-weight:600;padding-top:18px"></div>
        <button class="btn-remove" style="margin-top:18px" onclick="removePayment(${i})">✕</button>
      </div>
      <div style="margin-left:32px"><label class="field-label">Описание этапа</label>
        <input type="text" value="${esc(p.desc)}" oninput="fd.payments[${i}].desc=this.value;save();updateDynamic()" placeholder="Например: После передачи проектной документации стадии П"></div>
    </div>`
  ).join('');
  const pctTotalEl=document.getElementById('pctTotal');
  if(pctTotalEl){
    const sum=fd.payments.reduce((a,p)=>a+p.pct,0);
    pctTotalEl.textContent=`Сумма: ${fmtDec(sum)}%`;
    pctTotalEl.style.color=Math.abs(sum-100)<0.1?'#8BC34A':'#f44336';
  }
}
function addPayment(){fd.payments.push({pct:0,desc:''});save();renderPayments()}
function removePayment(i){fd.payments.splice(i,1);save();renderPayments();updateDynamic()}
function movePayment(i,dir){const j=i+dir;if(j<0||j>=fd.payments.length)return;[fd.payments[i],fd.payments[j]]=[fd.payments[j],fd.payments[i]];save();renderPayments();updateDynamic()}
function resetPcts(){DEFAULT_SECTIONS.forEach(s=>{fd.designSections[s.key].pct=s.pct});save();render()}
function confirmAddSection(){
  const label=document.getElementById('newSectionLabel').value.trim();
  const code=document.getElementById('newSectionCode').value.trim().toUpperCase();
  if(!label){alert('Введите название раздела');return;}
  const key='custom_'+Date.now();
  if(!fd.customSections)fd.customSections=[];
  fd.customSections.push({key,label:label+(code?' ('+code+')':''),pct:5});
  fd.designSections[key]={enabled:true,stageP:true,stageR:true,pct:5};
  fd.labor.sectionStaff[key]={people:1,days:90};
  save();render();
}
function removeCustomSection(key){
  fd.customSections=fd.customSections.filter(s=>s.key!==key);
  delete fd.designSections[key];
  delete fd.labor.sectionStaff[key];
  save();render();
}

// ========== DYNAMIC UPDATES ==========
function updateDynamic(){
  const t=calcTotals();

  // pctSum in design section
  const ps=document.getElementById('pctSum');
  if(ps)ps.textContent=fmtDec(t.rawPctSum);

  // Price per m2
  const pm=document.getElementById('pricePerM2');
  if(pm){
    pm.textContent=fd.totalArea>0&&fd.totalContractPrice>0?fmt(t.pricePerM2)+' руб/м²':'—';
    const hint=document.getElementById('pricePerM2Hint');
    if(hint){
      const avg=getAvgPricePerM2();
      if(avg>0&&t.pricePerM2>0){
        const diff=((t.pricePerM2-avg)/avg*100);
        hint.textContent=`Среднее по истории: ${fmt(avg)} руб/м² (${diff>0?'+':''}${fmtDec(diff)}%)`;
        hint.style.color=Math.abs(diff)>20?'#ff9800':'#666';
      } else hint.textContent='';
    }
  }

  // NDS
  const ndsEl=document.getElementById('ndsValue');
  if(ndsEl){
    ndsEl.textContent=fd.totalContractPrice>0?fmt(t.nds)+' руб':'—';
    const tw=document.getElementById('totalWithNds');
    if(tw)tw.textContent=fd.totalContractPrice>0?`Сумма без НДС: ${fmt(t.basePrice)} руб`:'';
  }

  // Grand total
  const gt=document.getElementById('grandTotalValue');
  if(gt)gt.textContent=t.grandTotal>0?fmt(t.grandTotal)+' руб':'—';
  const ex=document.getElementById('extrasValue');
  if(ex)ex.textContent=t.extras>0?'+'+fmt(t.extras)+' руб':'0';

  // Cost breakdown table
  const cb=document.getElementById('costBreakdown');
  if(cb){
    cb.innerHTML=t.sectionBreakdown.filter(s=>s.enabled).map(s=>
      `<tr><td>${s.label}</td><td class="hl">${fmtDec(s.adjPct)}%</td><td>${fmt(s.price)} ₽</td><td>${fmt(s.cost)} ₽</td><td>${fmt(s.price-s.cost)} ₽</td></tr>`
    ).join('')+`<tr class="total"><td>Проектирование (без НДС)</td><td></td><td class="hl">${fmt(t.basePrice)} ₽</td><td>${fmt(t.totalCost)} ₽</td><td>${fmt(t.basePrice-t.totalCost)} ₽</td></tr>
    <tr class="total"><td>в т.ч. НДС 5%</td><td></td><td>${fmt(t.nds)} ₽</td><td></td><td></td></tr>
    ${t.extras>0?`<tr class="total"><td>Допстоимости (АГО, изыскания и др.)</td><td></td><td>${fmt(t.extras)} ₽</td><td></td><td></td></tr>`:''}
    <tr class="total"><td>ФИНАЛЬНАЯ ЦЕНА</td><td></td><td class="hl" style="font-size:15px">${fmt(t.grandTotal)} ₽</td><td></td><td></td></tr>`;
  }

  // Labor table
  const lt=document.getElementById('laborTable');
  if(lt){
    const costMonth=fd.labor.avgSalary*SALARY_TO_COST_COEFF;
    const lm=document.getElementById('laborCostMonth');
    if(lm)lm.textContent=fmtDec(costMonth)+' тыс. руб';
    const ld=document.getElementById('laborCostDay');
    if(ld)ld.textContent=`${fmtDec(costMonth/WORKING_DAYS_PER_MONTH)} тыс. руб/к.д.`;

    lt.innerHTML=`<div class="labor-row header"><div>Раздел</div><div>Люди</div><div>Дни</div><div>Затраты</div><div>Бюджет</div></div>`+
    getAllSections().filter(s=>fd.designSections[s.key]?.enabled).map(s=>{
      const l=calcLabor(s.key);
      const staff=fd.labor.sectionStaff[s.key]||{people:1,days:90};
      const hasPrice = fd.totalContractPrice > 0;
      return `<div class="labor-row">
        <div style="font-size:12px">${s.label}</div>
        <div><input class="labor-input" type="number" min="1" value="${staff.people}" onchange="fd.labor.sectionStaff['${s.key}'].people=parseInt(this.value)||1;save();updateDynamic()"></div>
        <div><input class="labor-input" type="number" min="1" value="${staff.days}" onchange="fd.labor.sectionStaff['${s.key}'].days=parseInt(this.value)||1;save();updateDynamic()"></div>
        <div style="font-size:12px">${fmt(l.totalCost)} ₽</div>
        <div style="font-size:12px;color:${hasPrice?(l.ok?'#8BC34A':'#f44336'):'#666'};font-weight:600">${hasPrice?(l.ok?'OK (+'+fmt(l.diff)+')':'−'+fmt(-l.diff)):'—'}</div>
      </div>`;
    }).join('');

    const enabledSections = getAllSections().filter(s=>fd.designSections[s.key]?.enabled);
    let totalPeople=0,totalCostAll=0,totalBudgetAll=0;
    enabledSections.forEach(s=>{
      const st=fd.labor.sectionStaff[s.key]||{people:1,days:90};
      totalPeople+=st.people;
      const lb=calcLabor(s.key);
      totalCostAll+=lb.totalCost;
      totalBudgetAll+=lb.budgetForSection;
    });
    const totalDiffAll=totalBudgetAll-totalCostAll;
    const hasP=fd.totalContractPrice>0;
    lt.innerHTML+=`<div class="labor-row" style="border-top:2px solid #8BC34A;font-weight:700;padding-top:10px">
      <div style="font-size:13px;color:#8BC34A">ИТОГО</div>
      <div style="text-align:center;color:#8BC34A">${totalPeople} чел.</div>
      <div></div>
      <div style="font-size:12px;color:#fff">${fmt(totalCostAll)} ₽</div>
      <div style="font-size:12px;color:${hasP?(totalDiffAll>=0?'#8BC34A':'#f44336'):'#666'};font-weight:700">${hasP?(totalDiffAll>=0?'+'+fmt(totalDiffAll):'−'+fmt(-totalDiffAll)):'—'}</div>
    </div>`;
  }

  // Payment amounts + timeline
  renderPayments();
  const grandForPay = t.grandTotal;
  fd.payments.forEach((p,i)=>{
    const el=document.getElementById('payAmt'+i);
    if(el&&grandForPay>0)el.textContent=fmt(grandForPay*p.pct/100)+' ₽';
  });

  const pt=document.getElementById('paymentTimeline');
  if(pt){
    if(grandForPay<=0){pt.innerHTML='<p style="font-size:12px;color:#666">Введите стоимость контракта</p>';}
    else {
      const totalDays=fd.schedules.agoDays+fd.schedules.engineeringDays+fd.schedules.stagePDays+fd.schedules.expertiseDays+fd.schedules.stageRDays;
      const startDate=new Date(fd.kpDate||Date.now());
      let cumPct=0;
      let html='<div class="timeline">';
      fd.payments.forEach((p,i)=>{
        if(p.pct<=0)return;
        cumPct+=p.pct;
        const dayOffset=Math.round(totalDays*cumPct/100);
        const d=new Date(startDate);d.setDate(d.getDate()+dayOffset);
        html+=`<div class="tl-item">
          <div class="tl-date">${d.toLocaleDateString('ru-RU')} — ${p.pct}% (${fmtDec(cumPct)}% накоп.)</div>
          <div class="tl-desc">${esc(p.desc)}</div>
          <div class="tl-amount">${fmt(grandForPay*p.pct/100)} руб</div>
        </div>`;
      });
      html+='</div>';
      pt.innerHTML=html;
    }
  }

  // Analytics
  const ac=document.getElementById('analyticsContent');
  if(ac){
    const avg=getAvgPricePerM2();
    ac.innerHTML=`
      <div class="grid2">
        <div class="info-box">
          <h4>Финансовые показатели</h4>
          <div class="info-row"><span class="lbl">Проектирование (с НДС)</span><span class="val big">${fmt(t.totalWithNds)} ₽</span></div>
          <div class="info-row"><span class="lbl">в т.ч. НДС 5%</span><span class="val">${fmt(t.nds)} ₽</span></div>
          <div class="info-row"><span class="lbl">Допстоимости</span><span class="val">${fmt(t.extras)} ₽</span></div>
          <div class="info-row"><span class="lbl">Финальная цена</span><span class="val green">${fmt(t.grandTotal)} ₽</span></div>
          <div class="info-row"><span class="lbl">Себестоимость (коэф. ${COST_COEFFICIENT})</span><span class="val">${fmt(t.totalCost)} ₽</span></div>
          <div class="info-row"><span class="lbl">Маржа проектирования</span><span class="val green">${fmt(t.basePrice-t.totalCost)} ₽ (${fmtDec(t.margin)}%)</span></div>
          <div class="info-row"><span class="lbl">Цена за м² (с НДС)</span><span class="val">${fd.totalArea>0?fmt(t.pricePerM2)+' ₽/м²':'—'}</span></div>
        </div>
        <div class="info-box">
          <h4>Сравнение с историей</h4>
          ${cloudHistory.length>0?`
            <div class="info-row"><span class="lbl">Проектов в базе</span><span class="val">${cloudHistory.length}</span></div>
            <div class="info-row"><span class="lbl">Средняя цена за м²</span><span class="val">${avg>0?fmt(avg)+' ₽/м²':'—'}</span></div>
            <div class="info-row"><span class="lbl">Текущая цена за м²</span><span class="val">${fd.totalArea>0?fmt(t.pricePerM2)+' ₽/м²':'—'}</span></div>
            ${t.pricePerM2>0&&avg>0?`<div class="info-row"><span class="lbl">Отклонение</span><span class="val">${fmtDec((t.pricePerM2-avg)/avg*100)}%</span></div>`:''}
          `:'<p style="font-size:12px;color:#666">Сохраните первое КП в историю для сравнения</p>'}
        </div>
      </div>
      <div class="info-box" style="margin-top:14px">
        <h4>Бюджет по разделам</h4>
        <table class="tbl"><thead><tr><th>Раздел</th><th>Бюджет (себестоимость)</th><th>Доля</th></tr></thead>
        <tbody>${t.sectionBreakdown.filter(s=>s.enabled).map(s=>
          `<tr><td>${s.label}</td><td>${fmt(s.cost)} ₽</td><td>${fmtDec(s.adjPct)}%</td></tr>`
        ).join('')}
        <tr class="total"><td>ИТОГО</td><td class="hl">${fmt(t.totalCost)} ₽</td><td>100%</td></tr></tbody></table>
      </div>
    `;
  }

  renderHistory();
}

// ========== HISTORY (Supabase) ==========
function getAvgPricePerM2(){
  const valid=cloudHistory.filter(h=>h.total_area>0&&h.kp_price>0);
  if(!valid.length)return 0;
  return valid.reduce((a,h)=>a+h.kp_price/h.total_area,0)/valid.length;
}

async function loadCloudHistory(){
  try{
    const{data,error}=await sb.from('kp_history').select('*').order('created_at',{ascending:false});
    if(error)throw error;
    cloudHistory=data||[];
  }catch(e){console.error('Supabase load error:',e);cloudHistory=[];}
  renderHistory();
  renderAnalytics();
}

async function saveToHistory(){
  if(!fd.projectName){alert('Введите название проекта');return}
  if(fd.totalContractPrice<0||fd.totalArea<0){alert('Цена и площадь не могут быть отрицательными');return}
  const row={
    project_name:fd.projectName,
    customer_name:fd.customerName,
    kp_date:fd.kpDate||null,
    kp_number:fd.kpNumber,
    object_type:fd.objectType,
    object_address:fd.objectAddress,
    total_area:fd.totalArea||0,
    floors_count:fd.floorsCount,
    kp_price:fd.totalContractPrice||0,
    contract_price:0,
    price_per_m2:fd.totalArea>0?Math.round(fd.totalContractPrice/fd.totalArea):0,
    form_data:JSON.parse(JSON.stringify(fd))
  };
  try{
    const{error}=await sb.from('kp_history').insert(row);
    if(error)throw error;
    alert('КП сохранено в облако');
    await loadCloudHistory();
  }catch(e){alert('Ошибка сохранения: '+e.message);console.error(e);}
}

function renderHistory(){
  const el=document.getElementById('historyList');if(!el)return;
  if(!cloudHistory.length){el.innerHTML='<p style="font-size:12px;color:#666">История пуста. Сохраните первое КП.</p>';return}
  el.innerHTML=cloudHistory.map(h=>
    `<div class="hist-card" onclick="loadFromCloudHistory('${h.id}')">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div class="name">${esc(h.project_name)}</div>
        <button class="btn-remove btn-sm" onclick="event.stopPropagation();removeFromCloud('${h.id}')" style="padding:4px 8px;font-size:10px">✕</button>
      </div>
      <div class="meta">${esc(h.customer_name||'')} • ${esc(h.object_type||'')} • ${h.kp_date||''}</div>
      <div class="price">${fmt(h.kp_price)} ₽ ${h.total_area>0?'• '+fmt(Math.round(h.kp_price/h.total_area))+' ₽/м² • '+fmt(h.total_area)+' м²':''}</div>
      ${h.contract_price>0?`<div style="font-size:11px;color:#888;margin-top:4px">Договор: <span style="color:#8BC34A;font-weight:600">${fmt(h.contract_price)} ₽</span> (${h.kp_price>0?Math.round((1-h.contract_price/h.kp_price)*100)+'% скидка':''})</div>`:''}
      <div style="margin-top:6px;display:flex;gap:6px" onclick="event.stopPropagation()">
        <input type="text" placeholder="Цена договора" value="${h.contract_price||''}" inputmode="numeric"
          style="flex:1;padding:5px 8px;font-size:11px;background:#222;border:1px solid #333;border-radius:4px;color:#fff"
          onchange="updateContractPrice('${h.id}',parseFmtInput(this.value))">
      </div>
    </div>`
  ).join('');
}

function loadFromCloudHistory(id){
  const h=cloudHistory.find(r=>r.id===id);
  if(!h||!h.form_data)return;
  if(!confirm('Загрузить данные проекта "'+h.project_name+'"? Текущие данные будут заменены.'))return;
  fd={...makeDefaultFd(),...JSON.parse(JSON.stringify(h.form_data))};
  save();render();
}

async function removeFromCloud(id){
  if(!confirm('Удалить это КП из истории?'))return;
  try{
    const{error}=await sb.from('kp_history').delete().eq('id',id);
    if(error)throw error;
    await loadCloudHistory();
  }catch(e){alert('Ошибка удаления: '+e.message);}
}

async function updateContractPrice(id,price){
  try{
    const{error}=await sb.from('kp_history').update({contract_price:price}).eq('id',id);
    if(error)throw error;
    const h=cloudHistory.find(r=>r.id===id);
    if(h)h.contract_price=price;
    renderHistory();
    renderAnalytics();
  }catch(e){alert('Ошибка обновления: '+e.message);}
}

// ========== АНАЛИТИКА ==========
function renderAnalytics(){
  const el=document.getElementById('analyticsContent');if(!el)return;
  if(!cloudHistory.length){el.innerHTML='<p style="color:#666">Нет данных для аналитики</p>';return}

  const withArea=cloudHistory.filter(h=>h.total_area>0&&h.kp_price>0);
  const withContract=cloudHistory.filter(h=>h.contract_price>0&&h.kp_price>0);

  const avgPriceM2=withArea.length?Math.round(withArea.reduce((a,h)=>a+h.kp_price/h.total_area,0)/withArea.length):0;
  const avgKpPrice=withArea.length?Math.round(withArea.reduce((a,h)=>a+h.kp_price,0)/withArea.length):0;
  const avgArea=withArea.length?Math.round(withArea.reduce((a,h)=>a+Number(h.total_area),0)/withArea.length):0;
  const avgDiscount=withContract.length?Math.round(withContract.reduce((a,h)=>a+(1-h.contract_price/h.kp_price)*100,0)/withContract.length):0;
  const avgContractPrice=withContract.length?Math.round(withContract.reduce((a,h)=>a+h.contract_price,0)/withContract.length):0;

  // Текущее КП vs средние
  const curPriceM2=fd.totalArea>0&&fd.totalContractPrice>0?fd.totalContractPrice/fd.totalArea:0;
  const diffPct=avgPriceM2>0&&curPriceM2>0?Math.round((curPriceM2-avgPriceM2)/avgPriceM2*100):0;

  // По типам объектов
  const byType={};
  withArea.forEach(h=>{
    const t=h.object_type||'Другое';
    if(!byType[t])byType[t]={count:0,totalPrice:0,totalArea:0};
    byType[t].count++;byType[t].totalPrice+=h.kp_price;byType[t].totalArea+=Number(h.total_area);
  });

  el.innerHTML=`
    <div class="grid2" style="margin-bottom:16px">
      <div class="info-box accent">
        <div style="font-size:11px;color:#888">Средняя цена за м² (все КП)</div>
        <div style="font-size:22px;font-weight:700;color:#8BC34A">${avgPriceM2?fmt(avgPriceM2)+' ₽/м²':'—'}</div>
        <div style="font-size:11px;color:#888;margin-top:4px">По ${withArea.length} проектам</div>
      </div>
      <div class="info-box accent">
        <div style="font-size:11px;color:#888">Средняя сумма КП</div>
        <div style="font-size:22px;font-weight:700;color:#8BC34A">${avgKpPrice?fmt(avgKpPrice)+' ₽':'—'}</div>
        <div style="font-size:11px;color:#888;margin-top:4px">Средняя площадь: ${avgArea?fmt(avgArea)+' м²':'—'}</div>
      </div>
    </div>
    ${curPriceM2>0&&avgPriceM2>0?`<div class="info-box ${Math.abs(diffPct)>15?'warn':'accent'}" style="margin-bottom:16px">
      <div style="font-size:11px;color:#888">Текущее КП vs среднее</div>
      <div style="font-size:18px;font-weight:700;color:${diffPct>0?'#ff9800':'#8BC34A'}">${fmt(Math.round(curPriceM2))} ₽/м² — ${diffPct>0?'+':''}${diffPct}% от средней</div>
    </div>`:''}
    ${withContract.length?`<div class="grid2" style="margin-bottom:16px">
      <div class="info-box">
        <div style="font-size:11px;color:#888">Средняя скидка (КП → Договор)</div>
        <div style="font-size:22px;font-weight:700;color:#ff9800">${avgDiscount}%</div>
        <div style="font-size:11px;color:#888;margin-top:4px">По ${withContract.length} договорам</div>
      </div>
      <div class="info-box">
        <div style="font-size:11px;color:#888">Средняя цена договора</div>
        <div style="font-size:22px;font-weight:700;color:#8BC34A">${fmt(avgContractPrice)} ₽</div>
      </div>
    </div>`:''}
    <h4 style="color:#888;margin-bottom:10px">Статистика по типам объектов</h4>
    <table class="tbl">
      <thead><tr><th>Тип</th><th>КП</th><th>Ср. цена/м²</th><th>Ср. площадь</th></tr></thead>
      <tbody>${Object.entries(byType).map(([t,d])=>
        `<tr><td>${esc(t)}</td><td class="hl">${d.count}</td><td>${fmt(Math.round(d.totalPrice/d.totalArea))} ₽</td><td>${fmt(Math.round(d.totalArea/d.count))} м²</td></tr>`
      ).join('')}</tbody>
    </table>
    <div style="font-size:11px;color:#555;margin-top:12px">Всего КП в базе: ${cloudHistory.length}</div>
  `;
}

// ========== GENERATE ==========
// KP_LOGO_BASE64 загружается из logo-data.js (base64 data URI)

function generateClientKP(){
  const t=calcTotals();
  const dateFormatted = new Date(fd.kpDate).toLocaleDateString('ru-RU',{day:'numeric',month:'long',year:'numeric'});
  const stagesStr = [fd.stages.stageP?'П':null, fd.stages.stageR?'Р':null].filter(Boolean).join(' + ') || 'П + Р';
  const totalDays = (Number(fd.schedules.agoDays)||0)+(Number(fd.schedules.engineeringDays)||0)+(Number(fd.schedules.stagePDays)||0)+(Number(fd.schedules.expertiseDays)||0)+(Number(fd.schedules.stageRDays)||0);

  const sectionNames = {
    gp:'Генеральный план',ar:'Архитектурные решения',kr:'Конструктивные решения',
    eo:'Электроснабжение',vk:'Водоснабжение и канализация',ovik:'Отопление и вентиляция',
    ss:'Слаботочные системы',pos:'ПОС',oos:'ООС',mpb:'Пожарная безопасность',th:'Технологические решения'
  };
  const sectionCodes = {gp:'ГП',ar:'АР',kr:'КР',eo:'ЭО',vk:'ВК',ovik:'ОВиК',ss:'СС',pos:'ПОС',oos:'ООС',mpb:'ПБ',th:'ТХ'};
  const enabledSecs = getEnabledSections();
  const designRowsHtml = enabledSecs.map(s=>{
    const ds = fd.designSections[s.key];
    const name = sectionNames[s.key] || s.label.replace(/\s*\(.*\)\s*$/,'');
    const code = sectionCodes[s.key] || (s.label.match(/\(([^)]+)\)/)||[])[1] || '';
    return `<tr><td>${name}</td><td>${code}</td><td class="highlight-val">${ds.stageP?'✓':'—'}</td><td class="highlight-val">${ds.stageR?'✓':'—'}</td></tr>`;
  }).join('');

  const servicesRows = [];
  let svcNum = 1;
  if(fd.stages.engineering||fd.costs.engineeringPrice) servicesRows.push(`<tr><td>${svcNum++}</td><td>Комплексные инженерные изыскания</td><td>—</td><td class="highlight-val">✓</td></tr>`);
  if(fd.stages.ago||fd.costs.agoPrice) servicesRows.push(`<tr><td>${svcNum++}</td><td>Обследование конструкций (ТЗК)</td><td>—</td><td class="highlight-val">✓</td></tr>`);
  if(fd.stages.stageP) servicesRows.push(`<tr><td>${svcNum++}</td><td>Проектная документация</td><td>Стадия П</td><td class="highlight-val">✓</td></tr>`);
  if(fd.stages.expertise||fd.costs.expertisePrice) servicesRows.push(`<tr><td>${svcNum++}</td><td>Экспертиза проектной документации</td><td>—</td><td class="highlight-val">✓</td></tr>`);
  if(fd.stages.stageR) servicesRows.push(`<tr><td>${svcNum++}</td><td>Рабочая документация</td><td>Стадия Р</td><td class="highlight-val">✓</td></tr>`);
  if(fd.additionalServices.authorSupervision) servicesRows.push(`<tr><td>${svcNum++}</td><td>Авторский надзор</td><td>—</td><td class="highlight-val">✓</td></tr>`);

  // Расчёт долей П и Р (если обе — 40/60, если одна — 100%)
  const hasP = fd.stages.stageP, hasR = fd.stages.stageR;
  const pShare = hasP && hasR ? 0.4 : hasP ? 1 : 0;
  const rShare = hasP && hasR ? 0.6 : hasR ? 1 : 0;

  const costRows = [];
  if(fd.costs.engineeringPrice) costRows.push(`<tr><td>Инженерные изыскания</td><td class="highlight-val">${fmt(fd.costs.engineeringPrice)} руб.</td><td>Геология, геодезия, экология</td></tr>`);
  if(fd.costs.agoPrice) costRows.push(`<tr><td>Обследование конструкций (ТЗК)</td><td class="highlight-val">${fmt(fd.costs.agoPrice)} руб.</td><td>${fmt(fd.totalArea)} м²</td></tr>`);
  if(hasP) costRows.push(`<tr><td>Проектная документация (Стадия П)</td><td class="highlight-val">${fmt(Math.round(t.basePrice*pShare))} руб.</td><td>${Math.round(pShare*100)}% от стоимости проектирования</td></tr>`);
  if(fd.costs.expertisePrice) costRows.push(`<tr><td>Экспертиза</td><td class="highlight-val">${fmt(fd.costs.expertisePrice)} руб.</td><td>Государственная / Негосударственная</td></tr>`);
  if(hasR) costRows.push(`<tr><td>Рабочая документация (Стадия Р)</td><td class="highlight-val">${fmt(Math.round(t.basePrice*rShare))} руб.</td><td>${Math.round(rShare*100)}% от стоимости проектирования</td></tr>`);
  if(fd.costs.additionalWorksPrice) costRows.push(`<tr><td>Дополнительные услуги</td><td class="highlight-val">${fmt(fd.costs.additionalWorksPrice)} руб.</td><td>Доп. работы</td></tr>`);
  costRows.push(`<tr class="total-row"><td>ИТОГО</td><td class="highlight-val" style="font-size:16px;">${fmt(t.grandTotal)} руб.</td><td>в т.ч. НДС 5% — ${fmt(t.nds)} руб.</td></tr>`);

  const paymentSteps = fd.payments.filter(p=>p.pct>0).map(p=>
    `<div class="payment-step"><div class="pct">${p.pct}%</div><div class="label">${esc(p.desc)}</div></div>`
  ).join('');

  // Таймлайн — только этапы с заполненными днями (>0)
  const timelineItems = [];
  if(Number(fd.schedules.engineeringDays)>0) timelineItems.push({title:'Инженерные изыскания',desc:'Полевые и камеральные работы: геология, геодезия, экология. Подготовка технических отчётов.',days:fd.schedules.engineeringDays});

  ).join('');

  const exclusionsHtml = (fd.exclusions||[]).filter(e=>e).map(e=>`<li>${esc(e)}</li>`).join('');

  const addServicesRows = [];
  if(fd.additionalServices.fireSafety) addServicesRows.push(`<tr><td>Спецтехусловия по пожарной безопасности</td><td>Разработка и согласование СТУ ПБ</td><td class="highlight-val">Включено</td></tr>`);

  const logoImg = `<img src="${KP_LOGO_BASE64}" alt="ГИП ФОРМАТ">`;

function exportExcel(){
  const t=calcTotals();
  let csv='\uFEFF"Раздел";"%";"Цена для заказчика";"Себестоимость";"Маржа";"Трудозатраты";"Статус"\n';
  t.sectionBreakdown.filter(s=>s.enabled).forEach(s=>{
    const l=calcLabor(s.key);
    csv+='"'+s.label+'";"'+fmtDec(s.adjPct)+'";"'+fmt(s.price)+'";"'+fmt(s.cost)+'";"'+fmt(s.price-s.cost)+'";"'+fmt(l.totalCost)+'";"'+(l.ok?'В бюджете':'Превышение')+'"\n';
  });
  csv+='"ИТОГО";"";"'+fmt(t.basePrice)+'";"'+fmt(t.totalCost)+'";"'+fmt(t.basePrice-t.totalCost)+'";"";""'+'\n';
  csv+='\n"НДС 5%";"";"'+fmt(t.nds)+'"\n"Проектирование с НДС";"";"'+fmt(t.totalWithNds)+'"\n';
  csv+='"Допстоимости";"";"'+fmt(t.extras)+'"\n"Финальная цена";"";"'+fmt(t.grandTotal)+'"\n';
  csv+='"Маржинальность";"";"'+fmtDec(t.margin)+'%"\n"Цена за м²";"";"'+(fd.totalArea>0?fmt(t.pricePerM2):'—')+'"\n';
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='Бюджет_'+(fd.projectName||'проект')+'_'+fd.kpDate+'.csv';
  a.click();
}
